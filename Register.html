        <form action="try.html">
            <input type="name" name="name" placeholder="Full Name" required>
            <input type="text" placeholder="Mobile number or email address" name="email" id="number-address" required>
            <input type="password" placeholder="New password" name="password" id="password" required>
            <button class="btn" onclick="genPassword()">Generate Password</button>
            <button type="submit">Sign Up</a></button>
            <div class="login">
                <p>Already have any account?</p>
                <a href="index.html">Log in</a>
            </div>
        </form>    
    </div>
    <script src="register.js"></script>
