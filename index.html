<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="m.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="nav">
        <h1>EXPENSE TRACKER</h1>
    </div>    
    <div class="Container">
        <h2>Log In</h2>
        <form action="try.html">
            <div class="input-box">
                <input type="email" id="email" name="Email" placeholder="Email Address" required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
                <input type="password" id="password" name="password" placeholder="password" required>
            </div>
            <div class="remember-forget">
                <input id="checkbox" type="checkbox">&nbsp;Remember me
                <a href="Reset.html">Forgot password?</a>
            </div>
            <button class="btn" type="submit">Log in</button>
            <div class="Register"><br>
                <p>Don't have any account?&nbsp;&nbsp;<a href="Register.html">Register</a></p>
            </div>
        </form>
    </div>
<footer>
    <div class="footerBottom">
        <p>Copyright &copy; 2025; Designed By <span class="designer">Neha Soni</span></p>
    </div>
</footer>
</body>
</html>
